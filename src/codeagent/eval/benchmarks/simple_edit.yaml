# 简单代码编辑场景
scenarios:
  - name: "fix-off-by-one"
    description: "修复 off-by-one 错误"
    prompt: "修复 main.py 中的 off-by-one 错误，range(n) 应该是 range(n+1)"
    input_files:
      main.py: |
        def count_to_n(n):
            for i in range(n):
                print(i)
        
        count_to_n(5)
    expected_files:
      main.py: |
        def count_to_n(n):
            for i in range(n+1):
                print(i)
        
        count_to_n(5)
    scoring:
      file_count: 1.0
    timeout_sec: 30

  - name: "add-docstring"
    description: "添加函数文档字符串"
    prompt: "为 main.py 中的 add 函数添加 docstring"
    input_files:
      main.py: |
        def add(a, b):
            return a + b
    expected_files:
      main.py: |
        def add(a, b):
            """Add two numbers and return the result."""
            return a + b
    scoring:
      file_count: 1.0
    timeout_sec: 30

  - name: "rename-variable"
    description: "重命名变量"
    prompt: "将 main.py 中的变量 x 重命名为 count"
    input_files:
      main.py: |
        x = 0
        for i in range(10):
            x += 1
        print(x)
    expected_files:
      main.py: |
        count = 0
        for i in range(10):
            count += 1
        print(count)
    scoring:
      file_count: 1.0
    timeout_sec: 30
